<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resume | Mihails Volohovs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/palette icon v3.png" type="image/png">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="dark-mode">
    <!-- Hidden dot button (top right) -->
    <a href="/scripts/" class="secret-dot"></a>
    <div class="hero-bg">
        <div class="overlay"></div>
        <div class="hero-center">

            <nav>
                <a href="/">HOME</a>
                <a href="/aboutme/">ABOUT ME</a>
                <a href="/academic/">ACADEMIC</a>
                <a href="/projects/">PROJECTS</a>
                <a href="/resume/" style="border-bottom: 2px solid var(--green)">RESUME</a>
            </nav>
            <div class="container">
                <div class="page-content">
                    <h2>Resume</h2>
                    <p>Computer science student with experience in Docker, Python, and Linux server management. Passionate about building my homelab efficiently and securely.</p>
                    <p><strong>Skills:</strong> Docker, Python, C++, Bash, Git, Linux, Traefik</p>
                    <a href="/assets/resume.pdf" target="_blank" class="btn">Download Resume</a>
                    <p></p>
                    <button id="showResumeBtn"  class="btn">Show Resume</button>
                    <p>Last updated: March 2026</p>
                    <div id="pdfContainer" style="display:none; margin-top:20px;">
                    <iframe src="/assets/resume.pdf" width="100%" height="600px"></iframe>
                    </div>
                </div>
            </div>
            <div class="hero-socials">
                <a href="https://www.linkedin.com/in/mihails-volohovs" target="_blank">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="mailto:mvolohovs@inbox.lv">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </div>
    <script>
        // Fade-in background image after load
        window.addEventListener('DOMContentLoaded', function () {
            const bg = document.querySelector('.hero-bg');
            const bgImg = new Image();
            bgImg.src = '/assets/background-photo-green.jpeg';
            bgImg.onload = function () {
                bg.classList.add('bg-loaded');
            }
        });
    </script>

    <script>
    const btn = document.getElementById('showResumeBtn');
    const container = document.getElementById('pdfContainer');

    btn.addEventListener('click', () => {
        if (container.style.display === 'none') {
        container.style.display = 'block';
        btn.textContent = 'Hide Resume';
        } else {
        container.style.display = 'none';
        btn.textContent = 'Show Resume';
        }
    });
    </script>
</body>

</html>
